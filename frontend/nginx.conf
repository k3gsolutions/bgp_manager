# Configuração de referência para imagem nginx do frontend (ex.: COPY para /etc/nginx/conf.d/default.conf).
# O limite padrão de corpo (1m) provoca 413 no POST /api/management/backup/import com backups JSON grandes.
#
# Ajuste o host em proxy_pass ao nome do serviço do backend na rede Docker (ex.: backend, api, bgpmanager-backend).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    location /api/ {
        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
